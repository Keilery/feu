<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechStore Pro - Full-Stack E-Commerce Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            color: #e2e8f0;
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .neon-glow {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.3);
        }
        
        .product-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-color: rgba(99, 102, 241, 0.5);
        }
        
        .stock-critical {
            animation: pulse-red 2s infinite;
            border: 2px solid #ef4444;
        }
        
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            50% { box-shadow: 0 0 20px 10px rgba(239, 68, 68, 0); }
        }
        
        .admin-sidebar {
            background: linear-gradient(180deg, #0f172a 0%, #1e293b 100%);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .gradient-text {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            transition: all 0.3s ease;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }
        
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .slide-in {
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            max-width: 400px;
        }
        
        .loading-skeleton {
            background: linear-gradient(90deg, rgba(255,255,255,0.05) 25%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
        }
        
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        
        .modal-overlay {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
        }
        
        .code-block {
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.875rem;
        }
        
        .api-endpoint {
            background: rgba(99, 102, 241, 0.1);
            border-left: 3px solid #6366f1;
            padding: 0.5rem 1rem;
            margin: 0.5rem 0;
            border-radius: 0 4px 4px 0;
        }
        
        .db-schema {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            border-radius: 8px;
            padding: 1rem;
        }
        
        .ws-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .payment-card {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .jwt-token {
            word-break: break-all;
            font-size: 0.75rem;
            color: #64748b;
        }
    </style>
</head>
<body class="antialiased">

    <!-- WebSocket Status Indicator -->
    <div class="fixed bottom-4 right-4 z-50 flex items-center gap-2 glass-panel px-4 py-2 rounded-full">
        <div class="ws-indicator" id="ws-status"></div>
        <span class="text-xs text-gray-400" id="ws-text">WebSocket: Connected</span>
    </div>

    <!-- Notifications Container -->
    <div id="notifications" class="notification space-y-2"></div>

    <!-- Navigation -->
    <nav class="glass-panel sticky top-0 z-40 border-b border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center cursor-pointer" onclick="app.router.navigate('store')">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center mr-3">
                        <i class="fas fa-bolt text-white text-xl"></i>
                    </div>
                    <div>
                        <span class="text-2xl font-bold gradient-text">TechStore</span>
                        <span class="text-xs text-gray-500 block">Pro Edition</span>
                    </div>
                </div>
                
                <div class="flex items-center space-x-4">
                    <div class="hidden md:flex items-center space-x-1 text-sm text-gray-400 mr-4">
                        <i class="fas fa-database mr-1"></i>
                        <span id="db-status">PostgreSQL: Connected</span>
                    </div>
                    
                    <button onclick="app.cart.toggle()" class="relative p-2 text-gray-400 hover:text-white transition group">
                        <i class="fas fa-shopping-cart text-xl group-hover:scale-110 transition-transform"></i>
                        <span id="cart-badge" class="absolute -top-1 -right-1 bg-gradient-to-r from-red-500 to-pink-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center hidden font-bold">0</span>
                    </button>
                    
                    <button onclick="app.auth.showLogin()" id="login-btn" class="text-gray-300 hover:text-white px-3 py-2 rounded-lg hover:bg-white/5 transition">
                        <i class="fas fa-user mr-2"></i>Войти
                    </button>
                    
                    <div id="user-menu" class="hidden relative">
                        <button onclick="app.auth.toggleMenu()" class="flex items-center gap-2 text-gray-300 hover:text-white px-3 py-2 rounded-lg hover:bg-white/5 transition">
                            <img id="user-avatar" src="" class="w-8 h-8 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600">
                            <span id="user-name" class="hidden sm:block"></span>
                            <i class="fas fa-chevron-down text-xs"></i>
                        </button>
                        <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-48 glass-panel rounded-xl border border-gray-700 overflow-hidden">
                            <button onclick="app.router.navigate('profile')" class="w-full text-left px-4 py-2 hover:bg-white/5 text-gray-300 hover:text-white transition">
                                <i class="fas fa-user-circle mr-2"></i>Профиль
                            </button>
                            <button onclick="app.router.navigate('orders')" class="w-full text-left px-4 py-2 hover:bg-white/5 text-gray-300 hover:text-white transition">
                                <i class="fas fa-shopping-bag mr-2"></i>Мои заказы
                            </button>
                            <button onclick="app.admin.show()" id="admin-menu-item" class="hidden w-full text-left px-4 py-2 hover:bg-white/5 text-indigo-400 hover:text-indigo-300 transition">
                                <i class="fas fa-shield-alt mr-2"></i>Админ панель
                            </button>
                            <hr class="border-gray-700 my-1">
                            <button onclick="app.auth.logout()" class="w-full text-left px-4 py-2 hover:bg-white/5 text-red-400 hover:text-red-300 transition">
                                <i class="fas fa-sign-out-alt mr-2"></i>Выйти
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main id="app-container" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Views will be injected here -->
    </main>

    <!-- Templates -->
    <template id="store-view">
        <div class="fade-in">
            <!-- Hero Section -->
            <div class="relative rounded-2xl overflow-hidden mb-8 bg-gradient-to-r from-indigo-900 to-purple-900 p-8 md:p-12">
                <div class="absolute inset-0 bg-[url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=1200&q=80')] opacity-20 bg-cover bg-center"></div>
                <div class="relative z-10">
                    <h1 class="text-4xl md:text-5xl font-bold mb-4">Премиум электроника</h1>
                    <p class="text-xl text-gray-300 mb-6 max-w-2xl">Полная интеграция с базой данных, real-time обновления через WebSocket и безопасная оплата</p>
                    <div class="flex flex-wrap gap-4">
                        <button onclick="document.getElementById('products-section').scrollIntoView({behavior: 'smooth'})" class="btn-primary px-6 py-3 rounded-xl font-semibold text-white">
                            Смотреть товары
                        </button>
                        <button onclick="app.demo.showArchitecture()" class="px-6 py-3 rounded-xl font-semibold border border-white/20 hover:bg-white/5 transition text-white">
                            <i class="fas fa-code mr-2"></i>Архитектура
                        </button>
                    </div>
                </div>
            </div>

            <!-- Filters -->
            <div class="glass-panel rounded-xl p-4 mb-6 flex flex-wrap gap-4 items-center justify-between sticky top-20 z-30">
                <div class="flex gap-2 overflow-x-auto pb-2 md:pb-0">
                    <button onclick="app.store.filter('all')" class="filter-btn active px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm font-medium transition whitespace-nowrap" data-category="all">
                        Все товары
                    </button>
                    <button onclick="app.store.filter('phones')" class="filter-btn px-4 py-2 rounded-lg hover:bg-white/5 text-gray-300 text-sm font-medium transition whitespace-nowrap" data-category="phones">
                        <i class="fas fa-mobile-alt mr-2"></i>Смартфоны
                    </button>
                    <button onclick="app.store.filter('laptops')" class="filter-btn px-4 py-2 rounded-lg hover:bg-white/5 text-gray-300 text-sm font-medium transition whitespace-nowrap" data-category="laptops">
                        <i class="fas fa-laptop mr-2"></i>Ноутбуки
                    </button>
                    <button onclick="app.store.filter('audio')" class="filter-btn px-4 py-2 rounded-lg hover:bg-white/5 text-gray-300 text-sm font-medium transition whitespace-nowrap" data-category="audio">
                        <i class="fas fa-headphones mr-2"></i>Аудио
                    </button>
                </div>
                <div class="flex items-center gap-4 text-sm text-gray-400">
                    <span class="flex items-center gap-2">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                        Live Updates
                    </span>
                    <span id="last-sync">Sync: <span class="text-gray-300">just now</span></span>
                </div>
            </div>

            <!-- Products Grid -->
            <div id="products-section" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="products-grid">
                <!-- Products injected here -->
            </div>
        </div>
    </template>

    <template id="admin-view">
        <div class="flex h-[calc(100vh-140px)] gap-6 fade-in">
            <!-- Sidebar -->
            <aside class="admin-sidebar w-64 rounded-2xl p-6 hidden md:block">
                <div class="mb-8">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                            <i class="fas fa-shield-alt text-white text-xl"></i>
                        </div>
                        <div>
                            <div class="font-bold text-white">Admin Panel</div>
                            <div class="text-xs text-green-400 flex items-center gap-1">
                                <div class="w-1.5 h-1.5 bg-green-400 rounded-full"></div>
                                Online
                            </div>
                        </div>
                    </div>
                    <div class="text-xs text-gray-500 font-mono bg-black/30 p-2 rounded-lg">
                        Role: SUPER_ADMIN<br>
                        JWT: <span class="text-indigo-400">Active</span>
                    </div>
                </div>
                
                <nav class="space-y-1">
                    <button onclick="app.admin.switchTab('dashboard')" class="admin-tab active w-full text-left px-4 py-3 rounded-xl bg-indigo-600/20 text-indigo-300 border border-indigo-500/30 transition flex items-center gap-3">
                        <i class="fas fa-chart-line w-5"></i> Дашборд
                    </button>
                    <button onclick="app.admin.switchTab('inventory')" class="admin-tab w-full text-left px-4 py-3 rounded-xl hover:bg-white/5 text-gray-400 hover:text-white transition flex items-center gap-3">
                        <i class="fas fa-boxes w-5"></i> Склад (DB)
                    </button>
                    <button onclick="app.admin.switchTab('orders')" class="admin-tab w-full text-left px-4 py-3 rounded-xl hover:bg-white/5 text-gray-400 hover:text-white transition flex items-center gap-3">
                        <i class="fas fa-shopping-bag w-5"></i> Заказы
                    </button>
                    <button onclick="app.admin.switchTab('api')" class="admin-tab w-full text-left px-4 py-3 rounded-xl hover:bg-white/5 text-gray-400 hover:text-white transition flex items-center gap-3">
                        <i class="fas fa-code w-5"></i> API Docs
                    </button>
                    <button onclick="app.admin.switchTab('websocket')" class="admin-tab w-full text-left px-4 py-3 rounded-xl hover:bg-white/5 text-gray-400 hover:text-white transition flex items-center gap-3">
                        <i class="fas fa-broadcast-tower w-5"></i> WebSocket
                    </button>
                </nav>

                <div class="mt-8 p-4 bg-black/20 rounded-xl border border-white/5">
                    <div class="text-xs text-gray-500 mb-2">System Status</div>
                    <div class="space-y-2 text-xs">
                        <div class="flex justify-between">
                            <span class="text-gray-400">DB Latency</span>
                            <span class="text-green-400">12ms</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-400">WS Ping</span>
                            <span class="text-green-400">24ms</span>
                        </div>
                        <div class="flex justify-between">
                            <span class="text-gray-400">Active Users</span>
                            <span class="text-indigo-400" id="active-users">42</span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Content -->
            <div class="flex-1 glass-panel rounded-2xl overflow-hidden flex flex-col">
                <div id="admin-content" class="flex-1 overflow-auto p-6">
                    <!-- Admin content injected here -->
                </div>
            </div>
        </div>
    </template>

    <!-- Modals -->
    <div id="modal-container" class="fixed inset-0 z-50 hidden">
        <!-- Modals injected here -->
    </div>

    <script>
        /**
         * TechStore Pro - Full Stack Architecture Simulation
         * 
         * ARCHITECTURE OVERVIEW:
         * =====================
         * 
         * Frontend: React/Vue (simulated with vanilla JS)
         * Backend: Node.js + Express (simulated)
         * Database: PostgreSQL (simulated with localStorage + structured schema)
         * Real-time: WebSocket (simulated with EventEmitter pattern)
         * Payment: Stripe/YooKassa integration (mock)
         * Auth: JWT tokens (simulated)
         */

        // ==========================================
        // DATABASE SCHEMA (PostgreSQL Simulation)
        // ==========================================
        const DB_SCHEMA = {
            users: {
                id: 'SERIAL PRIMARY KEY',
                email: 'VARCHAR(255) UNIQUE NOT NULL',
                password_hash: 'VARCHAR(255) NOT NULL', -- bcrypt
                role: 'ENUM("customer", "admin") DEFAULT "customer"',
                created_at: 'TIMESTAMP DEFAULT NOW()',
                profile: 'JSONB'
            },
            products: {
                id: 'SERIAL PRIMARY KEY',
                name: 'VARCHAR(255) NOT NULL',
                category: 'VARCHAR(50) NOT NULL',
                price: 'DECIMAL(10,2) NOT NULL',
                stock: 'INTEGER DEFAULT 0',
                image_url: 'TEXT',
                description: 'TEXT',
                created_at: 'TIMESTAMP DEFAULT NOW()',
                updated_at: 'TIMESTAMP'
            },
            orders: {
                id: 'SERIAL PRIMARY KEY',
                user_id: 'INTEGER REFERENCES users(id)',
                items: 'JSONB NOT NULL', -- Array of {product_id, quantity, price}
                total_amount: 'DECIMAL(10,2)',
                status: 'ENUM("pending", "paid", "shipped", "delivered")',
                payment_intent_id: 'VARCHAR(255)', -- Stripe/YooKassa ID
                created_at: 'TIMESTAMP DEFAULT NOW()'
            },
            websocket_events: {
                id: 'SERIAL PRIMARY KEY',
                event_type: 'VARCHAR(50)',
                payload: 'JSONB',
                created_at: 'TIMESTAMP DEFAULT NOW()'
            }
        };

        // ==========================================
        // BACKEND API SIMULATION (Express.js style)
        // ==========================================
        const API = {
            baseURL: 'https://api.techstore.pro/v1',
            
            // Auth endpoints
            auth: {
                POST: {
                    '/login': 'JWT token + refresh token',
                    '/register': 'Create user + hash password',
                    '/refresh': 'Rotate JWT tokens',
                    '/logout': 'Invalidate token blacklist'
                }
            },
            
            // Product endpoints
            products: {
                GET: {
                    '/products': 'List with pagination & filters',
                    '/products/:id': 'Single product details',
                    '/products/:id/stock': 'Real-time stock check'
                },
                POST: {
                    '/products': 'Create (Admin only) + DB transaction',
                    '/products/:id/restock': 'Add inventory (Admin only)'
                },
                PUT: {
                    '/products/:id': 'Update (Admin only)'
                },
                DELETE: {
                    '/products/:id': 'Soft delete (Admin only)'
                }
            },
            
            // Order endpoints
            orders: {
                POST: {
                    '/orders': 'Create order + payment intent',
                    '/orders/:id/pay': 'Confirm payment + update stock'
                },
                GET: {
                    '/orders': 'User order history',
                    '/orders/admin/all': 'All orders (Admin)'
                }
            },
            
            // WebSocket events
            ws: {
                'stock:update': 'Broadcast to all clients',
                'order:new': 'Notify admins',
                'user:connect': 'Track active sessions'
            }
        };

        // ==========================================
        // APPLICATION CORE
        // ==========================================
        const app = {
            state: {
                user: null,
                cart: [],
                products: [],
                orders: [],
                wsConnected: true,
                currentView: 'store',
                adminTab: 'dashboard'
            },

            // Database Service (PostgreSQL simulation)
            db: {
                init() {
                    // Initialize localStorage as "PostgreSQL"
                    if (!localStorage.getItem('ts_db_initialized')) {
                        const initialProducts = [
                            { id: 1, name: "iPhone 15 Pro Max", category: "phones", price: 119900, stock: 15, image: "https://images.unsplash.com/photo-1696446701796-da61225697cc?w=400&q=80", sales: 45, description: "A17 Pro, Titanium design" },
                            { id: 2, name: "MacBook Pro 16 M3", category: "laptops", price: 249900, stock: 8, image: "https://images.unsplash.com/photo-1517336714731-489689fd1ca4?w=400&q=80", sales: 23, description: "M3 Max chip, 36GB RAM" },
                            { id: 3, name: "AirPods Pro 2 USB-C", category: "audio", price: 24900, stock: 3, image: "https://images.unsplash.com/photo-1600294037681-c80b4cb5b434?w=400&q=80", sales: 89, description: "Active Noise Cancellation" },
                            { id: 4, name: "Samsung S24 Ultra", category: "phones", price: 129900, stock: 12, image: "https://images.unsplash.com/photo-1610945265078-3858a0828671?w=400&q=80", sales: 34, description: "AI features, S Pen" },
                            { id: 5, name: "Sony WH-1000XM5", category: "audio", price: 34900, stock: 20, image: "https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?w=400&q=80", sales: 56, description: "Industry-leading noise cancel" },
                            { id: 6, name: "Dell XPS 15 OLED", category: "laptops", price: 189900, stock: 5, image: "https://images.unsplash.com/photo-1593642632823-8f78536788c6?w=400&q=80", sales: 18, description: "3.5K OLED, RTX 4070" },
                            { id: 7, name: "iPad Pro 13 M4", category: "laptops", price: 149900, stock: 7, image: "https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?w=400&q=80", sales: 29, description: "Ultra Retina XDR" },
                            { id: 8, name: "Marshall Stanmore III", category: "audio", price: 39900, stock: 2, image: "https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?w=400&q=80", sales: 67, description: "Iconic sound, Bluetooth 5.2" }
                        ];
                        
                        localStorage.setItem('ts_products', JSON.stringify(initialProducts));
                        localStorage.setItem('ts_orders', JSON.stringify([]));
                        localStorage.setItem('ts_users', JSON.stringify([
                            { id: 1, email: 'admin@techstore.pro', password: 'admin123', role: 'admin', name: 'Admin' },
                            { id: 2, email: 'user@example.com', password: 'user123', role: 'customer', name: 'John Doe' }
                        ]));
                        localStorage.setItem('ts_db_initialized', 'true');
                    }
                    
                    app.state.products = JSON.parse(localStorage.getItem('ts_products')) || [];
                    app.state.orders = JSON.parse(localStorage.getItem('ts_orders')) || [];
                },

                query(table) {
                    return {
                        select: () => JSON.parse(localStorage.getItem(`ts_${table}`) || '[]'),
                        insert: (data) => {
                            const items = JSON.parse(localStorage.getItem(`ts_${table}`) || '[]');
                            items.push({ ...data, id: Date.now() });
                            localStorage.setItem(`ts_${table}`, JSON.stringify(items));
                            return data;
                        },
                        update: (id, data) => {
                            const items = JSON.parse(localStorage.getItem(`ts_${table}`) || '[]');
                            const idx = items.findIndex(i => i.id === id);
                            if (idx !== -1) {
                                items[idx] = { ...items[idx], ...data, updated_at: new Date().toISOString() };
                                localStorage.setItem(`ts_${table}`, JSON.stringify(items));
                                return items[idx];
                            }
                            return null;
                        },
                        delete: (id) => {
                            const items = JSON.parse(localStorage.getItem(`ts_${table}`) || '[]');
                            const filtered = items.filter(i => i.id !== id);
                            localStorage.setItem(`ts_${table}`, JSON.stringify(filtered));
                        }
                    };
                },

                transaction(operations) {
                    // Simulate ACID transaction
                    console.log('[PostgreSQL] BEGIN TRANSACTION');
                    try {
                        operations();
                        console.log('[PostgreSQL] COMMIT');
                    } catch (e) {
                        console.log('[PostgreSQL] ROLLBACK:', e);
                        throw e;
                    }
                }
            },

            // WebSocket Service (Socket.io simulation)
            ws: {
                listeners: {},
                
                connect() {
                    console.log('[WebSocket] Connecting to wss://api.techstore.pro...');
                    setTimeout(() => {
                        app.state.wsConnected = true;
                        app.ui.notify('WebSocket подключен', 'success');
                        this.emit('user:connect', { userId: app.state.user?.id, timestamp: Date.now() });
                    }, 500);
                    
                    // Simulate incoming events
                    setInterval(() => this.simulateEvents(), 8000);
                },
                
                on(event, callback) {
                    if (!this.listeners[event]) this.listeners[event] = [];
                    this.listeners[event].push(callback);
                },
                
                emit(event, data) {
                    console.log(`[WebSocket] Emit: ${event}`, data);
                    if (this.listeners[event]) {
                        this.listeners[event].forEach(cb => cb(data));
                    }
                },
                
                simulateEvents() {
                    if (!app.state.wsConnected) return;
                    
                    // Random stock update simulation
                    if (Math.random() > 0.6) {
                        const product = app.state.products[Math.floor(Math.random() * app.state.products.length)];
                        if (product && product.stock > 0) {
                            product.stock--;
                            product.sales++;
                            app.db.query('products').update(product.id, product);
                            this.emit('stock:update', { productId: product.id, newStock: product.stock });
                            app.ui.showToast(`📉 ${product.name}: осталось ${product.stock} шт.`);
                        }
                    }
                    
                    // Update active users count
                    const activeUsers = Math.floor(Math.random() * 50) + 20;
                    document.getElementById('active-users') && (document.getElementById('active-users').textContent = activeUsers);
                }
            },

            // Authentication Service (JWT simulation)
            auth: {
                currentUser: null,
                token: null,
                
                login(email, password) {
                    return new Promise((resolve, reject) => {
                        setTimeout(() => {
                            const users = app.db.query('users').select();
                            const user = users.find(u => u.email === email && u.password === password);
                            
                            if (user) {
                                // Generate JWT (simulated)
                                const header = btoa(JSON.stringify({ alg: 'HS256', typ: 'JWT' }));
                                const payload = btoa(JSON.stringify({ 
                                    userId: user.id, 
                                    email: user.email, 
                                    role: user.role,
                                    iat: Date.now(),
                                    exp: Date.now() + 24 * 60 * 60 * 1000
                                }));
                                const signature = btoa('simulated-signature');
                                this.token = `${header}.${payload}.${signature}`;
                                
                                this.currentUser = { ...user, password: undefined };
                                app.state.user = this.currentUser;
                                
                                localStorage.setItem('ts_jwt', this.token);
                                localStorage.setItem('ts_user', JSON.stringify(this.currentUser));
                                
                                resolve({ user: this.currentUser, token: this.token });
                            } else {
                                reject(new Error('Invalid credentials'));
                            }
                        }, 600); // Simulate network delay
                    });
                },
                
                logout() {
                    this.currentUser = null;
                    this.token = null;
                    app.state.user = null;
                    localStorage.removeItem('ts_jwt');
                    localStorage.removeItem('ts_user');
                    app.ui.updateAuthUI();
                    app.router.navigate('store');
                    app.ui.notify('Вы вышли из системы');
                },
                
                checkAuth() {
                    const saved = localStorage.getItem('ts_user');
                    const token = localStorage.getItem('ts_jwt');
                    if (saved && token) {
                        this.currentUser = JSON.parse(saved);
                        this.token = token;
                        app.state.user = this.currentUser;
                        return true;
                    }
                    return false;
                },
                
                showLogin() {
                    app.ui.showModal('login');
                },
                
                toggleMenu() {
                    const dropdown = document.getElementById('user-dropdown');
                    dropdown.classList.toggle('hidden');
                }

                    return new Promise((resolve) => {

                            resolve({

                                amount: amount,

                                status: 'requires_confirmation'

                        }, 1000);
                    });

                async confirmPayment(intentId) {
                    console.log(`[Payment] Confirming ${intentId}`);
                    return new Promise((resolve) => {

            // Cart Logic
            cart: {
                items: [],
                
                add(productId) {
                    const product = app.state.products.find(p => p.id === productId);
                    if (!product || product.stock <= 0) return;
                    
                    const existing = this.items.find(i => i.id === productId);
                    if (existing) {
                        if (existing.quantity < product.stock) {
                            existing.quantity++;
                        } else {
                            app.ui.notify('Достигнут лимит доступного количества', 'error');
                            return;
                        }
                    } else {
                        this.items.push({ ...product, quantity: 1 });
                    }
                    
                    this.updateUI();
                    app.ui.notify(`${product.name} добавлен в корзину`);
                },
                
                updateQuantity(productId, delta) {
                    const item = this.items.find(i => i.id === productId);
                    const product = app.state.products.find(p => p.id === productId);
                    
                    if (!item) return;
                    
                    const newQty = item.quantity + delta;
                    if (newQty <= 0) {
                        this.items = this.items.filter(i => i.id !== productId);
                    } else if (newQty <= product.stock) {
                        item.quantity = newQty;
                    } else {
                        app.ui.notify('Недостаточно товара на складе', 'error');
                        return;
                    }
                    
                    this.updateUI();
                    this.renderModal();
                },
                
                remove(productId) {
                    this.items = this.items.filter(i => i.id !== productId);
                    this.updateUI();
                    this.renderModal();
                },
                
                getTotal() {
                    return this.items.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                },
                
                updateUI() {
                    const badge = document.getElementById('cart-badge');
                    const total = this.items.reduce((sum, item) => sum + item.quantity, 0);

                            oldStock,
                            updatedBy: app.state.user?.id,
                            timestamp: Date.now()

                async processPayment(e, amount) {
                    e.preventDefault();
                    const btn = e.target.querySelector('button[type="submit"]');
                    btn.innerHTML = '<i class="fas fa-circle-notch fa-spin mr-2"></i>Обработка...';
                    btn.disabled = true;
                    
                    try {
                        // Step 1: Create payment intent
                        const intent = await app.payment.createPaymentIntent(amount);
                        console.log('[Stripe] PaymentIntent created:', intent.id);
                        
                        // Step 2: Confirm payment (simulated)
                        await new Promise(r => setTimeout(r, 1500));
                        const confirmed = await app.payment.confirmPayment(intent.id);
                        
                        if (confirmed.status === 'succeeded') {
                            // Step 3: Create order in DB
                            const order = {
                                id: Date.now(),
                                userId: app.state.user.id,
                                userEmail: app.state.user.email,
                                items: app.cart.items.map(i => ({ id: i.id, name: i.name, price: i.price, quantity: i.quantity })),
                                total: amount,
                                status: 'paid',
                                paymentId: intent.id,
                                date: new Date().toLocaleString('ru-RU')
                            };
                            
                            // Atomic transaction simulation
                            app.db.transaction(() => {
                                // Deduct stock
                                app.cart.items.forEach(item => {
                                    const product = app.state.products.find(p => p.id === item.id);
                                    if (product) {
                                        product.stock -= item.quantity;
                                        product.sales += item.quantity;
                                    }
                                });
                                
                                // Save order
                                app.state.orders.push(order);
                                localStorage.setItem('ts_products', JSON.stringify(app.state.products));
                                localStorage.setItem('ts_orders', JSON.stringify(app.state.orders));
                            });
                            
                            // Clear cart
                            app.cart.items = [];
                            app.cart.updateUI();
                            
                            // Notify via WebSocket
                            app.ws.emit('order:new', order);
                            
                            this.closeModal();
                            this.notify('Оплата успешна! Заказ создан.', 'success');
                            app.store.render();
                            
                            // Show order confirmation
                            setTimeout(() => {
                                alert(`Заказ #${order.id} оплачен!\n\nВ реальном приложении здесь был бы редирект на страницу заказа.`);
                            }, 500);
                        }
                    } catch (err) {
                        this.notify('Ошибка оплаты: ' + err.message, 'error');
                        btn.innerHTML = '<i class="fas fa-lock mr-2"></i>Оплатить';
                        btn.disabled = false;
                    }
                },
