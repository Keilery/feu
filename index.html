<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUXE | Премиум электроника</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #c9a962;
            --accent-light: #e0c78a;
            --bg: #fafafa;
            --surface: #ffffff;
        }
        
        * {
            font-family: 'Inter', sans-serif;
        }
        
        .font-serif {
            font-family: 'Playfair Display', serif;
        }
        
        body {
            background-color: var(--bg);
            color: var(--primary);
        }
        
        /* Элегантные анимации */
        .fade-in {
            animation: fadeIn 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .slide-up {
            animation: slideUp 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Кнопки с эффектом */
        .btn-elegant {
            background: linear-gradient(135deg, var(--primary) 0%, #2d2d2d 100%);
            color: white;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        .btn-elegant::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: left 0.5s;
        }
        
        .btn-elegant:hover::before {
            left: 100%;
        }
        
        .btn-elegant:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .btn-outline {
            border: 1px solid var(--primary);
            color: var(--primary);
            background: transparent;
            transition: all 0.3s ease;
        }
        
        .btn-outline:hover {
            background: var(--primary);
            color: white;
            transform: translateY(-2px);
        }
        
        /* Карточки товаров */
        .product-card {
            background: var(--surface);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
        }
        
        .product-image {
            overflow: hidden;
        }
        
        .product-image img {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .product-card:hover .product-image img {
            transform: scale(1.05);
        }
        
        /* Акцентные элементы */
        .accent-text {
            color: var(--accent);
        }
        
        .accent-bg {
            background: var(--accent);
        }
        
        .accent-border {
            border-color: var(--accent);
        }
        
        /* Навигация */
        .nav-link {
            position: relative;
            color: #666;
            transition: color 0.3s;
        }
        
        .nav-link::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--accent);
            transition: width 0.3s;
        }
        
        .nav-link:hover {
            color: var(--primary);
        }
        
        .nav-link:hover::after {
            width: 100%;
        }
        
        /* Модальные окна */
        .modal-overlay {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
        }
        
        .modal-content {
            background: var(--surface);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
        }
        
        /* Складские индикаторы */
        .stock-indicator {
            height: 3px;
            background: #e5e5e5;
            border-radius: 2px;
            overflow: hidden;
        }
        
        .stock-fill {
            height: 100%;
            transition: width 0.6s ease;
        }
        
        /* Админ панель */
        .admin-sidebar {
            background: linear-gradient(180deg, #1a1a1a 0%, #2d2d2d 100%);
        }
        
        .admin-nav-item {
            transition: all 0.3s;
            border-left: 3px solid transparent;
        }
        
        .admin-nav-item:hover, .admin-nav-item.active {
            background: rgba(201, 169, 98, 0.1);
            border-left-color: var(--accent);
            color: var(--accent);
        }
        
        /* Уведомления */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 9999;
            animation: slideInRight 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        
        /* Градиентные тексты */
        .gradient-text {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* Чипы категорий */
        .category-chip {
            transition: all 0.3s;
            border: 1px solid transparent;
        }
        
        .category-chip:hover {
            border-color: var(--accent);
            color: var(--accent);
        }
        
        .category-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }
        
        /* Поля ввода */
        .input-elegant {
            border: 1px solid #e5e5e5;
            transition: all 0.3s;
            background: white;
        }
        
        .input-elegant:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(201, 169, 98, 0.1);
            outline: none;
        }
        
        /* Таблицы */
        .table-elegant th {
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.75rem;
            color: #999;
        }
        
        .table-elegant td {
            border-bottom: 1px solid #f0f0f0;
        }
        
        .table-elegant tr:hover td {
            background: #fafafa;
        }
        
        /* Микро-анимации */
        .hover-lift {
            transition: transform 0.3s;
        }
        
        .hover-lift:hover {
            transform: translateY(-2px);
        }
        
        /* Скроллбар */
        ::-webkit-scrollbar {
            width: 8px;
        }
        
        ::-webkit-scrollbar-track {
            background: #f1f1f1;
        }
        
        ::-webkit-scrollbar-thumb {
            background: #c1c1c1;
            border-radius: 4px;
        }
        
        ::-webkit-scrollbar-thumb:hover {
            background: #a1a1a1;
        }
        
        /* Лоадер */
        .loader {
            border: 2px solid #f3f3f3;
            border-top: 2px solid var(--accent);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body class="antialiased">

    <!-- Уведомления -->
    <div id="notifications"></div>

    <!-- Навигация -->
    <nav class="fixed top-0 w-full bg-white/90 backdrop-blur-md border-b border-gray-100 z-50 transition-all duration-300" id="navbar">
        <div class="max-w-7xl mx-auto px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <!-- Логотип -->
                <div class="flex items-center cursor-pointer" onclick="app.router.navigate('store')">
                    <span class="font-serif text-3xl font-bold tracking-tight">LUXE</span>
                    <span class="ml-2 text-xs uppercase tracking-widest text-gray-400 mt-1">Electronics</span>
                </div>

                <!-- Центральное меню -->
                <div class="hidden md:flex items-center space-x-8">
                    <button onclick="app.store.filter('all')" class="nav-link text-sm font-medium">Все товары</button>
                    <button onclick="app.store.filter('phones')" class="nav-link text-sm font-medium">Смартфоны</button>
                    <button onclick="app.store.filter('laptops')" class="nav-link text-sm font-medium">Ноутбуки</button>
                    <button onclick="app.store.filter('audio')" class="nav-link text-sm font-medium">Аудио</button>
                </div>

                <!-- Правая часть -->
                <div class="flex items-center space-x-6">
                    <!-- Поиск -->
                    <button class="text-gray-400 hover:text-gray-800 transition">
                        <i class="fas fa-search text-lg"></i>
                    </button>

                    <!-- Корзина -->
                    <button onclick="app.cart.toggle()" class="relative text-gray-800 hover:text-gray-600 transition">
                        <i class="fas fa-shopping-bag text-xl"></i>
                        <span id="cart-badge" class="absolute -top-2 -right-2 bg-black text-white text-xs w-5 h-5 flex items-center justify-center rounded-full hidden">0</span>
                    </button>

                    <!-- Профиль -->
                    <div id="user-section">
                        <button onclick="app.auth.showLogin()" id="login-btn" class="btn-outline px-6 py-2 rounded-full text-sm font-medium">
                            Войти
                        </button>
                        
                        <div id="user-menu" class="hidden relative">
                            <button onclick="app.auth.toggleMenu()" class="flex items-center gap-3 hover:bg-gray-50 px-4 py-2 rounded-full transition">
                                <div class="w-8 h-8 rounded-full bg-gradient-to-br from-gray-800 to-gray-600 flex items-center justify-center text-white text-sm font-medium" id="user-avatar">
                                    A
                                </div>
                                <span class="text-sm font-medium" id="user-name">Admin</span>
                                <i class="fas fa-chevron-down text-xs text-gray-400"></i>
                            </button>
                            
                            <div id="user-dropdown" class="hidden absolute right-0 mt-2 w-48 bg-white rounded-2xl shadow-xl border border-gray-100 py-2 transform origin-top-right transition-all">
                                <button onclick="app.router.navigate('profile')" class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 transition flex items-center gap-3">
                                    <i class="fas fa-user text-gray-400"></i> Профиль
                                </button>
                                <button onclick="app.router.navigate('orders')" class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 transition flex items-center gap-3">
                                    <i class="fas fa-shopping-bag text-gray-400"></i> Заказы
                                </button>
                                <button onclick="app.admin.show()" id="admin-menu-btn" class="hidden w-full text-left px-4 py-3 text-sm hover:bg-gray-50 transition flex items-center gap-3 text-amber-600">
                                    <i class="fas fa-crown"></i> Админ панель
                                </button>
                                <div class="border-t border-gray-100 my-1"></div>
                                <button onclick="app.auth.logout()" class="w-full text-left px-4 py-3 text-sm hover:bg-gray-50 transition flex items-center gap-3 text-red-600">
                                    <i class="fas fa-sign-out-alt"></i> Выйти
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Основной контент -->
    <main id="app-container" class="pt-20 min-h-screen">
        <!-- Контент загружается здесь -->
    </main>

    <!-- Модальное окно -->
    <div id="modal-container" class="fixed inset-0 z-50 hidden">
        <!-- Модальные окна рендерятся здесь -->
    </div>

    <!-- JavaScript -->
    <script>
        const app = {
            state: {
                user: null,
                products: [],
                cart: [],
                orders: [],
                currentFilter: 'all',
                view: 'store'
            },

            db: {
                init() {
                    if (!localStorage.getItem('luxe_db')) {
                        const initialData = {
                            products: [
                                { id: 1, name: "iPhone 15 Pro Max", category: "phones", price: 119900, stock: 15, image: "https://images.unsplash.com/photo-1696446701796-da61225697cc?w=600&q=80", sales: 45, description: "Титановый корпус, чип A17 Pro" },
                                { id: 2, name: "MacBook Pro 16", category: "laptops", price: 249900, stock: 8, image: "https://images.unsplash.com/photo-1517336714731-489689fd1ca4?w=600&q=80", sales: 23, description: "M3 Max, 36 ГБ объединённой памяти" },
                                { id: 3, name: "AirPods Pro 2", category: "audio", price: 24900, stock: 3, image: "https://images.unsplash.com/photo-1600294037681-c80b4cb5b434?w=600&q=80", sales: 89, description: "Активное шумоподавление, USB-C" },
                                { id: 4, name: "Samsung S24 Ultra", category: "phones", price: 129900, stock: 12, image: "https://images.unsplash.com/photo-1610945265078-3858a0828671?w=600&q=80", sales: 34, description: "ИИ-функции, встроенный S Pen" },
                                { id: 5, name: "Sony WH-1000XM5", category: "audio", price: 34900, stock: 20, image: "https://images.unsplash.com/photo-1618366712010-f4ae9c647dcb?w=600&q=80", sales: 56, description: "Лучшее шумоподавление в индустрии" },
                                { id: 6, name: "iPad Pro 13", category: "laptops", price: 149900, stock: 7, image: "https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?w=600&q=80", sales: 29, description: "M4, Ultra Retina XDR дисплей" },
                                { id: 7, name: "Marshall Stanmore III", category: "audio", price: 39900, stock: 2, image: "https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?w=600&q=80", sales: 67, description: "Легендарное звучание, Bluetooth 5.2" },
                                { id: 8, name: "Dell XPS 15", category: "laptops", price: 189900, stock: 5, image: "https://images.unsplash.com/photo-1593642632823-8f78536788c6?w=600&q=80", sales: 18, description: "OLED 3.5K, NVIDIA RTX 4070" }
                            ],
                            orders: [],
                            users: [
                                { id: 1, email: 'admin@luxe.com', password: 'admin123', role: 'admin', name: 'Администратор' },
                                { id: 2, email: 'user@luxe.com', password: 'user123', role: 'customer', name: 'Покупатель' }
                            ]
                        };
                        localStorage.setItem('luxe_db', JSON.stringify(initialData));
                    }
                    
                    const db = JSON.parse(localStorage.getItem('luxe_db'));
                    app.state.products = db.products;
                    app.state.orders = db.orders;
                },

                save() {
                    const db = JSON.parse(localStorage.getItem('luxe_db'));
                    db.products = app.state.products;
                    db.orders = app.state.orders;
                    localStorage.setItem('luxe_db', JSON.stringify(db));
                }
            },

            init() {
                this.db.init();
                this.checkAuth();
                this.router.navigate('store');
                this.setupEventListeners();
            },

            setupEventListeners() {
                // Закрытие dropdown при клике вне
                document.addEventListener('click', (e) => {
                    const userMenu = document.getElementById('user-menu');
                    const dropdown = document.getElementById('user-dropdown');
                    if (userMenu && !userMenu.contains(e.target)) {
                        dropdown?.classList.add('hidden');
                    }
                });
            },

            checkAuth() {
                const saved = localStorage.getItem('luxe_user');
                if (saved) {
                    app.state.user = JSON.parse(saved);
                    app.ui.updateAuthUI();
                }
            },

            router: {
                navigate(view) {
                    app.state.view = view;
                    const container = document.getElementById('app-container');
                    
                    if (view === 'store') {
                        container.innerHTML = app.views.store();
                        app.store.render();
                    } else if (view === 'admin') {
                        if (!app.state.user || app.state.user.role !== 'admin') {
                            app.ui.notify('Доступ запрещен', 'error');
                            return;
                        }
                        container.innerHTML = app.views.admin();
                        app.admin.renderDashboard();
                    }
                    
                    window.scrollTo(0, 0);
                }
            },

            views: {
                store() {
                    return `
                        <div class="fade-in">
                            <!-- Hero Section -->
                            <section class="relative h-[70vh] flex items-center justify-center overflow-hidden">
                                <div class="absolute inset-0">
                                    <img src="https://images.unsplash.com/photo-1550009158-9ebf69173e03?w=1920&q=80" class="w-full h-full object-cover" alt="Hero">
                                    <div class="absolute inset-0 bg-black/40"></div>
                                </div>
                                <div class="relative z-10 text-center text-white px-6 max-w-4xl">
                                    <p class="text-sm uppercase tracking-[0.3em] mb-4 text-amber-300">Премиум коллекция 2024</p>
                                    <h1 class="font-serif text-5xl md:text-7xl font-bold mb-6 leading-tight">Техника, которая<br>вдохновляет</h1>
                                    <p class="text-lg md:text-xl text-gray-200 mb-10 font-light">Подберите идеальное устройство из нашей эксклюзивной подборки</p>
                                    <div class="flex gap-4 justify-center">
                                        <button onclick="document.getElementById('products-section').scrollIntoView({behavior: 'smooth'})" class="btn-elegant px-8 py-4 rounded-full text-sm font-medium tracking-wide">
                                            Смотреть коллекцию
                                        </button>
                                        <button onclick="app.demo.showInfo()" class="border border-white text-white px-8 py-4 rounded-full text-sm font-medium tracking-wide hover:bg-white hover:text-black transition">
                                            О бренде
                                        </button>
                                    </div>
                                </div>
                            </section>

                            <!-- Фильтры -->
                            <section class="py-12 px-6 max-w-7xl mx-auto">
                                <div class="flex flex-wrap justify-center gap-4 mb-12">
                                    <button onclick="app.store.filter('all')" class="category-chip active px-6 py-3 rounded-full text-sm font-medium" data-filter="all">
                                        Все товары
                                    </button>
                                    <button onclick="app.store.filter('phones')" class="category-chip px-6 py-3 rounded-full text-sm font-medium text-gray-600" data-filter="phones">
                                        Смартфоны
                                    </button>
                                    <button onclick="app.store.filter('laptops')" class="category-chip px-6 py-3 rounded-full text-sm font-medium text-gray-600" data-filter="laptops">
                                        Ноутбуки
                                    </button>
                                    <button onclick="app.store.filter('audio')" class="category-chip px-6 py-3 rounded-full text-sm font-medium text-gray-600" data-filter="audio">
                                        Аудио
                                    </button>
                                </div>

                                <!-- Сетка товаров -->
                                <div id="products-section" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-8">
                                    <!-- Товары рендерятся здесь -->
                                </div>
                            </section>

                            <!-- Features -->
                            <section class="bg-white py-20 px-6">
                                <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-12 text-center">
                                    <div class="slide-up" style="animation-delay: 0.1s">
                                        <div class="w-16 h-16 mx-auto mb-6 rounded-full bg-gray-50 flex items-center justify-center">
                                            <i class="fas fa-shipping-fast text-2xl text-gray-800"></i>
                                        </div>
                                        <h3 class="font-serif text-xl font-semibold mb-3">Бесплатная доставка</h3>
                                        <p class="text-gray-600 text-sm leading-relaxed">При заказе от 50 000 ₽ по всей России</p>
                                    </div>
                                    <div class="slide-up" style="animation-delay: 0.2s">
                                        <div class="w-16 h-16 mx-auto mb-6 rounded-full bg-gray-50 flex items-center justify-center">
                                            <i class="fas fa-shield-alt text-2xl text-gray-800"></i>
                                        </div>
                                        <h3 class="font-serif text-xl font-semibold mb-3">Гарантия 2 года</h3>
                                        <p class="text-gray-600 text-sm leading-relaxed">Официальная гарантия производителя</p>
                                    </div>
                                    <div class="slide-up" style="animation-delay: 0.3s">
                                        <div class="w-16 h-16 mx-auto mb-6 rounded-full bg-gray-50 flex items-center justify-center">
                                            <i class="fas fa-undo text-2xl text-gray-800"></i>
                                        </div>
                                        <h3 class="font-serif text-xl font-semibold mb-3">30 дней на возврат</h3>
                                        <p class="text-gray-600 text-sm leading-relaxed">Без лишних вопросов и сложностей</p>
                                    </div>
                                </div>
                            </section>
                        </div>
                    `;
                },

                admin() {
                    return `
                        <div class="flex min-h-screen bg-gray-50 fade-in">
                            <!-- Sidebar -->
                            <aside class="admin-sidebar w-64 text-white flex-shrink-0">
                                <div class="p-8">
                                    <div class="font-serif text-2xl font-bold mb-1">LUXE</div>
                                    <div class="text-xs text-gray-400 uppercase tracking-widest">Admin Panel</div>
                                </div>
                                
                                <nav class="px-4 space-y-1">
                                    <button onclick="app.admin.renderDashboard()" class="admin-nav-item active w-full text-left px-6 py-4 rounded-r-xl flex items-center gap-4 text-sm">
                                        <i class="fas fa-chart-line w-5"></i> Дашборд
                                    </button>
                                    <button onclick="app.admin.renderInventory()" class="admin-nav-item w-full text-left px-6 py-4 rounded-r-xl flex items-center gap-4 text-sm text-gray-400 hover:text-white">
                                        <i class="fas fa-boxes w-5"></i> Склад
                                    </button>
                                    <button onclick="app.admin.renderOrders()" class="admin-nav-item w-full text-left px-6 py-4 rounded-r-xl flex items-center gap-4 text-sm text-gray-400 hover:text-white">
                                        <i class="fas fa-shopping-bag w-5"></i> Заказы
                                    </button>
                                    <button onclick="app.admin.renderUsers()" class="admin-nav-item w-full text-left px-6 py-4 rounded-r-xl flex items-center gap-4 text-sm text-gray-400 hover:text-white">
                                        <i class="fas fa-users w-5"></i> Пользователи
                                    </button>
                                </nav>

                                <div class="absolute bottom-0 left-0 right-0 p-6">
                                    <div class="bg-white/5 rounded-xl p-4">
                                        <div class="text-xs text-gray-400 mb-2">Система</div>
                                        <div class="flex items-center gap-2 text-sm">
                                            <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                                            <span>Онлайн</span>
                                        </div>
                                    </div>
                                </div>
                            </aside>

                            <!-- Content -->
                            <div class="flex-1 overflow-auto">

            cart: {
                add(productId) {
                    const product = app.state.products.find(p => p.id === productId);
                    if (!product || product.stock <= 0) return;

                    const existing = app.state.cart.find(i => i.id === productId);
                    if (existing) {
                        if (existing.quantity < product.stock) {
                            existing.quantity++;
                        } else {
                            app.ui.notify('Достигнут лимит доступного количества', 'error');
                            return;
                        }
                    } else {
                        app.state.cart.push({ ...product, quantity: 1 });
                    }

                    this.updateUI();
                    app.ui.notify(`${product.name} добавлен в корзину`);
                },

                updateQuantity(productId, delta) {
                    const item = app.state.cart.find(i => i.id === productId);
                    const product = app.state.products.find(p => p.id === productId);

                    if (!item) return;

                    const newQty = item.quantity + delta;
                    if (newQty <= 0) {
                        app.state.cart = app.state.cart.filter(i => i.id !== productId);
                    } else if (newQty <= product.stock) {
                        item.quantity = newQty;
                    } else {
                        app.ui.notify('Недостаточно товара на складе', 'error');
                        return;
                    }

                    this.updateUI();
                    this.renderModal();
                },

                remove(productId) {
                    app.state.cart = app.state.cart.filter(i => i.id !== productId);
                    this.updateUI();
                    this.renderModal();
                },

                getTotal() {
                    return app.state.cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
                },

                updateUI() {
                    const badge = document.getElementById('cart-badge');
                    const total = app.state.cart.reduce((sum, item) => sum + item.quantity, 0);

                    if (total > 0) {
                        badge.textContent = total;
                        badge.classList.remove('hidden');
                    } else {
                        badge.classList.add('hidden');
                    }
                },

                toggle() {
                    const modal = document.getElementById('modal-container');
                    if (modal.classList.contains('hidden')) {
                        this.renderModal();
                        modal.classList.remove('hidden');
                    } else {
                        modal.classList.add('hidden');

                renderModal() {
                    const modal = document.getElementById('modal-container');
                    const total = this.getTotal();

                    modal.innerHTML = `

                    notification.className = `${colors[type]} text-white px-6 py-4 rounded-2xl shadow-2xl flex items-center gap-3 mb-2`;
                    notification.innerHTML = `
                        <i class="fas ${type === 'success' ? 'fa-check' : type === 'error' ? 'fa-exclamation' : 'fa-info-circle'}"></i>
                        <span class="font-medium">${message}</span>
                    `;

                    container.appendChild(notification);

                    setTimeout(() => {
                        notification.style.opacity = '0';
                        notification.style.transform = 'translateX(100%)';
                        setTimeout(() => notification.remove(), 300);
                    }, 3000);
                },

                updateAuthUI() {
                    const loginBtn = document.getElementById('login-btn');
                    const userMenu = document.getElementById('user-menu');
                    const adminBtn = document.getElementById('admin-menu-btn');

                    if (app.state.user) {
                        loginBtn.classList.add('hidden');
                        userMenu.classList.remove('hidden');
                        document.getElementById('user-name').textContent = app.state.user.name;
                        document.getElementById('user-avatar').textContent = app.state.user.name.charAt(0);
                        
                        if (app.state.user.role === 'admin') {
                            adminBtn.classList.remove('hidden');
                        }
                    } else {
                        loginBtn.classList.remove('hidden');
                        userMenu.classList.add('hidden');
                    }
                },

                closeModal() {
                    document.getElementById('modal-container').classList.add('hidden');
                },

                showPaymentModal(total) {
                    const modal = document.getElementById('modal-container');
                    modal.innerHTML = `
                        <div class="modal-overlay fixed inset-0 flex items-center justify-center p-4" onclick="if(event.target === this) app.ui.closeModal()">
                            <div class="modal-content w-full max-w-lg rounded-3xl overflow-hidden slide-up">
                                <div class="p-8">
                                    <div class="text-center mb-8">
                                        <div class="w-16 h-16 mx-auto mb-4 rounded-full bg-gray-100 flex items-center justify-center">
                                            <i class="fas fa-lock text-2xl text-gray-800"></i>
                                        </div>
                                        <h2 class="font-serif text-2xl font-bold mb-2">Оплата заказа</h2>
                                        <p class="text-gray-500">Безопасное соединение SSL</p>
                                    </div>

                                    <div class="bg-gray-50 rounded-2xl p-6 mb-6">
                                        <div class="flex justify-between items-center mb-4">
                                            <span class="text-gray-600">Сумма к оплате</span>
                                            <span class="font-serif text-3xl font-bold">₽${total.toLocaleString()}</span>
                                        </div>
                                        <div class="flex gap-2 justify-center text-2xl text-gray-400">
                                            <i class="fab fa-cc-visa"></i>
                                            <i class="fab fa-cc-mastercard"></i>
                                            <i class="fab fa-cc-mir"></i>
                                        </div>
                                    </div>

                                    <form onsubmit="app.ui.processPayment(event, ${total})" class="space-y-4">
                                        <div>
                                            <label class="block text-sm font-medium text-gray-700 mb-2">Номер карты</label>
                                            <input type="text" class="input-elegant w-full px-4 py-3 rounded-xl font-mono" placeholder="4242 4242 4242 4242" value="4242 4242 4242 4242">
                                        </div>
                                        <div class="grid grid-cols-2 gap-4">
                                            <div>
                                                <label class="block text-sm font-medium text-gray-700 mb-2">Срок</label>
                                                <input type="text" class="input-elegant w-full px-4 py-3 rounded-xl font-mono" placeholder="MM/YY" value="12/25">
                                            </div>
                                            <div>
                                                <label class="block text-sm font-medium text-gray-700 mb-2">CVC</label>
                                                <input type="text" class="input-elegant w-full px-4 py-3 rounded-xl font-mono" placeholder="123" value="123">
                                            </div>
                                        </div>
                                        <button type="submit" class="w-full btn-elegant py-4 rounded-xl font-medium mt-6">
                                            Оплатить ₽${total.toLocaleString()}
                                        </button>
                                    </form>

                                    <button onclick="app.ui.closeModal()" class="w-full mt-4 text-sm text-gray-500 hover:text-gray-800">Отмена</button>
                                </div>
                            </div>
                        </div>
                    `;
                },

                async processPayment(e, total) {
                    e.preventDefault();
                    const btn = e.target.querySelector('button[type="submit"]');
                    btn.innerHTML = '<div class="loader mx-auto"></div>';
                    btn.disabled = true;

                    await new Promise(r => setTimeout(r, 1500));

                    // Создание заказа
                    const order = {
                        id: Date.now(),
                        userId: app.state.user.id,
                        userName: app.state.user.name,
                        items: [...app.state.cart],
                        total: total,
                        date: new Date().toLocaleString('ru-RU'),
                        status: 'paid'
                    };

                    // Обновление склада
                    app.state.cart.forEach(item => {
                        const product = app.state.products.find(p => p.id === item.id);
                        if (product) {
                            product.stock -= item.quantity;
                            product.sales += item.quantity;
                        }
                    });

                    app.state.orders.push(order);
                    app.db.save();

                    app.state.cart = [];
                    app.cart.updateUI();

                    this.closeModal();
                    this.notify('Оплата прошла успешно!', 'success');
                    
                    if (app.state.view === 'store') app.store.render();
                },

                showAddProductModal() {
                    const modal = document.getElementById('modal-container');
                    modal.innerHTML = `
                        <div class="modal-overlay fixed inset-0 flex items-center justify-center p-4" onclick="if(event.target === this) app.ui.closeModal()">
                            <div class="modal-content w-full max-w-md rounded-3xl overflow-hidden slide-up">
                                <div class="p-8">
                                    <h2 class="font-serif text-2xl font-bold mb-6">Новый товар</h2>
                                    <form onsubmit="app.ui.handleAddProduct(event)" class="space-y-4">
                                        <input type="text" id="new-name" placeholder="Название" class="input-elegant w-full px-4 py-3 rounded-xl" required>
                                        <select id="new-category" class="input-elegant w-full px-4 py-3 rounded-xl">
                                            <option value="phones">Смартфоны</option>
                                            <option value="laptops">Ноутбуки</option>
                                            <option value="audio">Аудио</option>
                                        </select>
                                        <div class="grid grid-cols-2 gap-4">
                                            <input type="number" id="new-price" placeholder="Цена" class="input-elegant w-full px-4 py-3 rounded-xl" required>
                                            <input type="number" id="new-stock" placeholder="Количество" class="input-elegant w-full px-4 py-3 rounded-xl" required>
                                        </div>
                                        <input type="file" id="new-image" accept="image/*" class="w-full text-sm text-gray-600 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-gray-100 file:text-gray-700 hover:file:bg-gray-200">
                                        <div class="flex gap-3 mt-6">
                                            <button type="button" onclick="app.ui.closeModal()" class="flex-1 py-3 rounded-xl border border-gray-300 text-gray-700 font-medium hover:bg-gray-50 transition">Отмена</button>
                                            <button type="submit" class="flex-1 btn-elegant py-3 rounded-xl font-medium">Добавить</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        </div>
                    `;
                },

                handleAddProduct(e) {
                    e.preventDefault();
                    const fileInput = document.getElementById('new-image');
                    
                    const handleCreate = (imageUrl) => {
                        const newProduct = {
                            id: Date.now(),
                            name: document.getElementById('new-name').value,
                            category: document.getElementById('new-category').value,
                            price: parseInt(document.getElementById('new-price').value),
                            stock: parseInt(document.getElementById('new-stock').value),
                            image: imageUrl,
                            sales: 0,
                            description: 'Новый товар'
                        };

                        app.state.products.push(newProduct);
                        app.db.save();
                        
                        this.closeModal();
                        app.admin.renderInventory();
                        this.notify('Товар добавлен успешно', 'success');
                    };

                    if (fileInput.files && fileInput.files[0]) {
                        const reader = new FileReader();
                        reader.onload = (e) => handleCreate(e.target.result);
                        reader.readAsDataURL(fileInput.files[0]);
                    } else {
                        handleCreate('https://via.placeholder.com/400x400/f3f4f6/9ca3af?text=No+Image');
                    }
                }
            },

            demo: {
                showInfo() {
                    alert('LUXE — премиальный магазин электроники\n\nДемо-данные:\n• Админ: admin@luxe.com / admin123\n• Клиент: user@luxe.com / user123');
                }
            }
        };

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => app.init());
    </script>
</body>
</html>
