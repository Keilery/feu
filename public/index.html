<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SubStore — Сервисы и подписки</title>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .nav { display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px 30px; border-radius: 12px; margin-bottom: 30px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .stock { font-size: 0.8em; color: #64748b; }
        button { background: var(--primary); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: 600; }
        button:disabled { background: #cbd5e1; }
        .modal { background: white; padding: 20px; border-radius: 12px; margin-top: 20px; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="nav">
    <h2>SubStore 🚀</h2>
    <div id="auth-section">
        <input id="email" type="email" placeholder="Email">
        <input id="pass" type="password" placeholder="Пароль">
        <button onclick="auth('login')" style="width: auto;">Вход</button>
        <button onclick="auth('register')" style="width: auto; background: #94a3b8;">Регистрация</button>
    </div>
    <div id="user-section" class="hidden">
        <span id="user-email"></span> | <button onclick="logout()" style="width: auto;">Выйти</button>
    </div>
</div>

<div class="grid" id="products"></div>

<div id="account" class="modal hidden">
    <h3>Мои подписки</h3>
    <ul id="my-orders"></ul>
</div>

<script>
    async function load() {
        // Загрузка товаров
        const pRes = await fetch('/api/products');
        const products = await pRes.json();
        document.getElementById('products').innerHTML = products.map(p => `
            <div class="card">
                <h3>${p.name}</h3>
                <p>Цена: <b>${p.price} ₽</b></p>
                <p class="stock">Осталось: ${p.stock} шт.</p>
                <button onclick="buy(${p.id})" ${p.stock <= 0 ? 'disabled' : ''}>
                    ${p.stock > 0 ? 'Купить' : 'Нет в наличии'}
                </button>
            </div>
        `).join('');

        // Проверка сессии
        const uRes = await fetch('/api/user-info');
        if (uRes.ok) {
            const data = await uRes.json();
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('user-section').classList.remove('hidden');
            document.getElementById('user-email').innerText = data.email;
            document.getElementById('account').classList.remove('hidden');
            document.getElementById('my-orders').innerHTML = data.orders.map(o => `<li>${o.product_name} — ${o.date}</li>`).join('');
        }
    }

    async function auth(type) {
        const email = document.getElementById('email').value;
        const password = document.getElementById('pass').value;
        const res = await fetch(`/api/${type}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email, password })
        });
        const data = await res.json();
        if (data.error) alert(data.error);
        else location.reload();
    }

    async function buy(productId) {
        const res = await fetch('/api/buy', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ productId })
        });
        const data = await res.json();
        if (data.error) alert(data.error);
        else { alert(data.message); load(); }
    }

    async function logout() {
        await fetch('/api/logout');
        location.reload();
    }

    load();
</script>
</body>
</html>
